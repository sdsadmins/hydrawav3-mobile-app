name: hydrawav3
description: Hydrawav3 - Physical therapy device control app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # UI icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # BLE
  flutter_blue_plus: ^1.35.2

  # Local Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  drift_flutter: ^0.2.4

  # Key-Value Storage
  shared_preferences: ^2.3.4

  # Secure Storage
  flutter_secure_storage: ^9.2.3

  # Authentication
  local_auth: ^2.3.0

  # JSON Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Payments
  flutter_stripe: ^11.2.0

  # Voice Input
  speech_to_text: ^7.0.0

  # Social Sharing
  share_plus: ^10.1.3

  # Connectivity
  connectivity_plus: ^6.1.1

  # Animated Icons
  lottie: ^3.3.1

  # Images
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.5.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  wakelock_plus: ^1.2.8
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  drift_dev: ^2.22.1
  mockito: ^5.4.5
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/fonts/
    - assets/animations/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icon.jpg"
  min_sdk_android: 21
